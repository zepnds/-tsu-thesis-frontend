server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # DNS Resolver (Docker default)
    resolver 127.0.0.11 valid=30s;

    # Proxy /api requests to the backend
    location /api {
        proxy_pass https://tsu-thesis-backend.onrender.com/api;
        proxy_http_version 1.1;
        proxy_set_header Host tsu-thesis-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSL Handshake settings
        proxy_ssl_server_name on;
        proxy_ssl_session_reuse off;
        
        # Handle CORS fallback if backend fails
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Proxy /uploads requests to the backend
    location /uploads {
        proxy_pass https://tsu-thesis-backend.onrender.com/uploads;
        proxy_set_header Host tsu-thesis-backend.onrender.com;
        proxy_ssl_server_name on;
    }

    # SPA Routing: Route everything to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Control for Static Assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Error Pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
