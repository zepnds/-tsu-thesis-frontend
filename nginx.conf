server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # CSP for Google Maps and internal API
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.google.com https://*.googleapis.com; img-src 'self' data: https://*.google.com https://*.googleapis.com https://*.gstatic.com; font-src 'self' https://*.googleapis.com https://*.gstatic.com; connect-src 'self' https://*.google.com https://*.googleapis.com http://localhost:5000; style-src 'self' 'unsafe-inline' https://*.googleapis.com; frame-src 'self' https://*.google.com;";


  # SPA routing
  location / {
    try_files $uri /index.html;
  }

  # Proxy API requests to the backend container
  location /api/ {
    proxy_pass https://tsu-thesis-backend.onrender.com/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

